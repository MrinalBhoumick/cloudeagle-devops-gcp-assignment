<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="sync-service — smart assistant on Google Cloud Run. Ask anything, safely."
    />
    <title>sync-service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:ital,opsz,wght@0,8..48,300;0,8..48,500;0,8..48,600;0,8..48,700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/style.css?v=0.6.0" />
  </head>
  <body>
    <a class="skip" href="#chat">Skip to chat</a>
    <div class="bg-mesh" aria-hidden="true"></div>
    <div class="grid-noise" aria-hidden="true"></div>

    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <h1>sync-service</h1>
          <p>Assistant on <span class="brand-gcp">Google Cloud Run</span></p>
        </div>
        <nav class="nav-pills" aria-label="Service status">
          <span class="pill" id="pill-env"><strong>—</strong> env</span>
          <span class="pill warn" id="pill-vertex"><strong>LLM</strong> —</span>
          <span class="pill" id="pill-session"><strong>—</strong> session</span>
          <a class="pill pill-link" href="/docs" target="_blank" rel="noopener">API</a>
        </nav>
      </div>
    </header>

    <main class="layout layout--focus">
      <section class="chat-panel" id="chat" aria-labelledby="chat-heading">
        <div class="chat-panel__head">
          <h2 id="chat-heading">Chat</h2>
          <span class="ver-pill" id="pill-version" title="Build from /api/v1/summary">—</span>
        </div>
        <div id="chat-log" class="chat-log" role="log" aria-live="polite" aria-relevant="additions"></div>
        <form id="chat-form" class="input-row" autocomplete="off">
          <label for="message" class="visually-hidden">Message</label>
          <textarea
            id="message"
            name="message"
            rows="2"
            placeholder="Message the assistant…"
            required
          ></textarea>
          <button type="submit" id="send">Send</button>
        </form>
        <p id="chat-error" role="alert"></p>
        <div class="suggestions" role="group" aria-label="Try asking">
          <button type="button" class="chip" data-ask="Give me three fun weekend ideas.">Weekend</button>
          <button type="button" class="chip" data-ask="Explain what an API is in two sentences.">API</button>
          <button type="button" class="chip" data-ask="How do I stay productive when working from home?">Focus</button>
          <button type="button" class="chip" data-ask="What is the difference between SQL and NoSQL, briefly?">Data</button>
        </div>
        <p class="chat-footnote" role="note">Public URL — do not send passwords or private data.</p>
      </section>
    </main>

    <section class="meta-strip" aria-label="Service links">
      <div class="meta-strip-inner">
        <p>Quick links: <a href="/health">/health</a> · <a href="/actuator/health">/actuator/health</a> ·
        <a href="/api/v1/summary">/api/v1/summary</a> · <a href="/api/v1/info">/api/v1/info</a></p>
      </div>
    </section>

    <footer class="site-footer">
      <p>
        sync-service · <span id="footer-version" class="mono">v —</span>
      </p>
    </footer>
    <script src="/assets/app.js?v=0.6.0" defer></script>
  </body>
</html>
