# Spring Boot on GKE — image built from sync-service-spring/ (Jenkins: DOCKERFILE_DIR=sync-service-spring)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-service-spring
  namespace: sync-service
  labels:
    app: sync-service-spring
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    # Single small node: avoid 2× pods during rollout (Insufficient cpu/memory).
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: sync-service-spring
  template:
    metadata:
      labels:
        app: sync-service-spring
    spec:
      containers:
        - name: app
          image: us-central1-docker.pkg.dev/project-15d206fe-12aa-4854-8f0/sync-service/sync-service:spring-1.5.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
